components:
  schemas:
    Assignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenant_id:
          type: string
          readOnly: true
        application_id:
          type: string
          maxLength: 100
        tag_id:
          type: string
          format: uuid
          readOnly: true
        resource_type:
          type: string
          maxLength: 100
        resource_id:
          type: string
          maxLength: 255
        assigned_by:
          type: string
          nullable: true
          maxLength: 255
        assigned_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - application_id
      - assigned_at
      - id
      - resource_id
      - resource_type
      - tag_id
      - tenant_id
    AssignmentWrite:
      type: object
      properties:
        application_id:
          type: string
          maxLength: 100
        tag_id:
          type: string
          format: uuid
        alias_id:
          type: string
          format: uuid
        alias_slug:
          type: string
          maxLength: 255
        resource_type:
          type: string
          maxLength: 100
        resource_id:
          type: string
          maxLength: 255
        assigned_by:
          type: string
          nullable: true
          maxLength: 255
      required:
      - application_id
      - resource_id
      - resource_type
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenant_id:
          type: string
          readOnly: true
        application_id:
          type: string
          readOnly: true
          nullable: true
        action:
          type: string
          readOnly: true
        entity_type:
          type: string
          readOnly: true
        entity_id:
          type: string
          readOnly: true
        tag_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        resource_type:
          type: string
          readOnly: true
          nullable: true
        resource_id:
          type: string
          readOnly: true
          nullable: true
        actor_id:
          type: string
          readOnly: true
          nullable: true
        request_id:
          type: string
          readOnly: true
          nullable: true
        operation_id:
          type: string
          format: uuid
          readOnly: true
        changes:
          readOnly: true
        metadata:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - actor_id
      - application_id
      - changes
      - created_at
      - entity_id
      - entity_type
      - id
      - metadata
      - operation_id
      - request_id
      - resource_id
      - resource_type
      - tag_id
      - tenant_id
    BulkAssign:
      type: object
      properties:
        application_id:
          type: string
          maxLength: 100
        resource_type:
          type: string
          maxLength: 100
        resource_id:
          type: string
          maxLength: 255
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
        alias_slugs:
          type: array
          items:
            type: string
            maxLength: 255
        assigned_by:
          type: string
          nullable: true
          maxLength: 255
      required:
      - application_id
      - resource_id
      - resource_type
    BulkRemove:
      type: object
      properties:
        application_id:
          type: string
          maxLength: 100
        resource_type:
          type: string
          maxLength: 100
        resource_id:
          type: string
          maxLength: 255
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
      required:
      - application_id
      - resource_id
      - resource_type
      - tag_ids
    PatchedTagAliasPatch:
      type: object
      properties:
        application_id:
          type: string
          nullable: true
          maxLength: 100
        tag_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
        metadata: {}
        is_active:
          type: boolean
    PatchedTagPatch:
      type: object
      properties:
        application_id:
          type: string
          nullable: true
          maxLength: 100
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
        type:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true
        vocabulary_id:
          type: string
          format: uuid
          nullable: true
        metadata: {}
        is_active:
          type: boolean
    PatchedVocabularyPatch:
      type: object
      properties:
        application_id:
          type: string
          nullable: true
          maxLength: 100
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        metadata: {}
        is_active:
          type: boolean
    ResourceReplace:
      type: object
      properties:
        application_id:
          type: string
          maxLength: 100
        resource_type:
          type: string
          maxLength: 100
        resource_id:
          type: string
          maxLength: 255
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
        alias_slugs:
          type: array
          items:
            type: string
            maxLength: 255
        assigned_by:
          type: string
          nullable: true
          maxLength: 255
      required:
      - application_id
      - resource_id
      - resource_type
    ResourceTag:
      type: object
      properties:
        assignment_id:
          type: string
          format: uuid
        assigned_by:
          type: string
          nullable: true
        assigned_at:
          type: string
          format: date-time
        tag:
          $ref: '#/components/schemas/Tag'
      required:
